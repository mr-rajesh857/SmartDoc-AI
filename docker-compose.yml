version: '3.9'

services:
  db:
    image: mysql:8.0-alpine
    container_name: rag_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-rag_db}
      MYSQL_USER: ${DB_USER:-rag_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-rag_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      DB_USER: ${DB_USER:-rag_user}
      DB_PASSWORD: ${DB_PASSWORD:-rag_password}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-rag_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      OCR_CONCURRENCY: ${OCR_CONCURRENCY:-8}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/storage:/app/storage
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - rag_network
    command: /app/start.sh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rag_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - rag_network

volumes:
  mysql_data:
    driver: local

networks:
  rag_network:
    driver: bridge
